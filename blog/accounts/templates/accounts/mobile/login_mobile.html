{% extends "blog_context/mobile/base_mobile.html" %}

{% block title %}登录 - 手机端{% endblock %}

{% block m_css %}
<style>
    .m-login-container {
        padding: 40px 12px;
        text-align: center;
    }
    .m-login-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .m-login-subtitle { font-size: 14px; color: var(--m-muted); margin-bottom: 40px; }
    .m-login-form { text-align: left; }
    .m-field { margin-bottom: 20px; }
    .m-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #555; }
    .m-login-btn { width: 100%; height: 48px; font-size: 16px; margin-top: 12px; }
    .m-login-footer { margin-top: 24px; font-size: 13px; color: var(--m-muted); }
    .m-login-footer a { color: var(--m-accent); font-weight: 700; }
</style>
{% endblock %}

{% block content %}
<div class="m-login-container">
    <h1 class="m-login-title">欢迎回来</h1>
    <p class="m-login-subtitle">一个极简的分享空间。</p>
    
    <form method="post" class="m-login-form">
        {% csrf_token %}
        <div class="m-field">
            <label class="m-label">用户名</label>
            <input type="text" name="username" class="m-input" placeholder="输入你的用户名" required>
        </div>
        <div class="m-field">
            <label class="m-label">密码</label>
            <input type="password" name="password" class="m-input" placeholder="输入密码" required>
        </div>
        <button type="submit" class="m-btn m-login-btn">立即登录</button>
    </form>
    
    <p class="m-login-footer">
        还没有账号？ <a href="{% url 'accounts:register' %}">立即注册</a>
    </p>
</div>
{% endblock %}
