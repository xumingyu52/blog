{% extends "blog_context/mobile/base_mobile.html" %}
{% load static %}

{% block title %}发布新内容 - 手机端{% endblock %}

{% block m_css %}
<link rel="stylesheet" href="{% static 'images/css/quill.snow.css' %}">
<style>
    .m-new-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; }
    .m-form-item { margin-bottom: 24px; }
    .m-form-label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    
    /* Quill 优化 */
    #editor-container {
        height: auto;
        min-height: 300px;
        background: #fff;
        border: 1px solid var(--m-border);
        border-radius: 0 0 12px 12px;
        border-top: none;
        font-size: 15px;
    }
    .ql-toolbar.ql-snow {
        background: #f9f9f9;
        border: 1px solid var(--m-border) !important;
        border-radius: 12px 12px 0 0;
        padding: 8px !important;
    }
    .ql-editor {
        min-height: 300px;
        padding: 12px 16px !important;
        line-height: 1.6;
    }
    .ql-editor ul, .ql-editor ol {
        padding-left: 1.5em !important;
    }
    .ql-editor img {
        max-width: 100%;
        border-radius: 8px;
    }
    
    .m-submit-area {
        margin-top: 30px;
        padding-bottom: 20px;
    }
</style>
{% endblock %}

{% block content %}
<h1 class="m-new-title">分享新鲜事</h1>

<form method="post" enctype="multipart/form-data" id="post-form">
    {% csrf_token %}
    <div class="m-form-item">
        <label class="m-form-label">标题</label>
        {{ title_form.text }}
    </div>
    
    <div class="m-form-item">
        <label class="m-form-label">正文内容</label>
        <div id="toolbar-container">
            <span class="ql-formats">
                <button class="ql-header" value="1"></button>
                <button class="ql-header" value="2"></button>
            </span>
            <span class="ql-formats">
                <button class="ql-list" value="bullet"></button>
                <button class="ql-list" value="ordered"></button>
                <button class="ql-code-block"></button>
            </span>
            <span class="ql-formats">
                <button class="ql-image"></button>
            </span>
        </div>
        <div id="editor-container"></div>
        <div style="display:none;">
            {{ context_form.text }}
        </div>
    </div>

    <!-- 已移除所有可见的封面图表单元素 -->

    <div class="m-submit-area">
        <button type="submit" class="m-btn" style="width: 100%; height: 48px; border-radius: 12px; font-size: 16px;">
            立即发布
        </button>
    </div>
</form>

<input type="file" id="quill-file-upload" accept="image/*" style="display: none;">
{% endblock %}

{% block extra_js %}
<script src="{% static 'images/js/quill.min.js' %}"></script>
<script>
    // 强制样式注入
    const titleInput = document.querySelector('input[name="title-text"]');
    if(titleInput) titleInput.classList.add('m-input');

    // 图标同步
    var icons = Quill.import('ui/icons');
    icons['header']['1'] = '<img src="{% static "images/icon/标题_h1.svg" %}" style="width:16px;"/>';
    icons['header']['2'] = '<img src="{% static "images/icon/标题1_h2.svg" %}" style="width:16px;"/>';
    icons['list']['bullet'] = '<img src="{% static "images/icon/列表2_list-two.svg" %}" style="width:16px;"/>';
    icons['list']['ordered'] = '<img src="{% static "images/icon/数字列表_list-numbers.svg" %}" style="width:16px;"/>';
    icons['code-block'] = '<img src="{% static "images/icon/代码_code.svg" %}" style="width:16px;"/>';
    icons['image'] = '<img src="{% static "images/icon/增加图片_add-pic.svg" %}" style="width:16px;"/>';

    var quill = new Quill('#editor-container', {
        theme: 'snow',
        modules: {
            toolbar: {
                container: '#toolbar-container',
                handlers: {
                    image: function () {
                        document.getElementById('quill-file-upload').click();
                    }
                }
            }
        }
    });

    // 禁用自带 required 弹出，通过 JS 同步内容
    const hiddenTextarea = document.querySelector('textarea[name="context-text"]');
    if(hiddenTextarea) hiddenTextarea.removeAttribute("required");

    document.getElementById("post-form").onsubmit = function () {
        if (hiddenTextarea) {
            hiddenTextarea.value = quill.root.innerHTML;
        }
    };

    document.getElementById('quill-file-upload').addEventListener('change', function () {
        if (this.files && this.files[0]) {
            var formData = new FormData();
            formData.append("image", this.files[0]);
            var range = quill.getSelection(true);
            quill.insertText(range.index, '[上传中...]', 'user');

            fetch("{% url 'blog_context:upload_image' %}", {
                method: "POST",
                body: formData,
                headers: { "X-CSRFToken": "{{ csrf_token }}" }
            }).then(r => r.json()).then(data => {
                quill.deleteText(range.index, 7);
                if (data.success) {
                    quill.insertEmbed(range.index, 'image', data.url);
                }
            });
        }
        this.value = '';
    });
</script>
{% endblock %}
